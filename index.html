<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Couch to 5K">
<title>Couch to 5K</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1e;color:#fff;min-height:100vh;overscroll-behavior:none;}
#splash{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.screen{display:none;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,44px) 16px 90px;}
.screen.active{display:block;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#12121f;border-top:1px solid rgba(255,255,255,0.07);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));z-index:100;}
.nav button{flex:1;background:none;border:none;color:rgba(255,255,255,0.3);font-size:9px;cursor:pointer;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;}
.nav button.active{color:#3b82f6;}
.nav button span{font-size:17px;}
.hero{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);margin:-44px -16px 0;padding:calc(env(safe-area-inset-top,44px)+28px) 18px 28px;border-radius:0 0 24px 24px;}
.card{background:#12121f;border:0.5px solid rgba(255,255,255,0.08);border-radius:13px;padding:13px 15px;margin-bottom:9px;}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-sm{padding:7px 14px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);border:0.5px solid rgba(255,255,255,0.12);border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px;}
.stat{background:rgba(255,255,255,0.06);border-radius:10px;padding:9px 7px;border:0.5px solid rgba(255,255,255,0.07);}
.stat-label{color:rgba(255,255,255,0.38);font-size:9px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.stat-val{font-size:19px;font-weight:700;color:#fff;}
.stat-sub{font-size:9px;color:rgba(255,255,255,0.28);margin-top:1px;}
.progress-bar{height:4px;background:rgba(255,255,255,0.07);border-radius:2px;margin:12px 0;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:2px;transition:width .5s;}
.section-title{font-size:17px;font-weight:700;margin:14px 0 11px;}
.week-card{background:#1a1a2e;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.week-card.current{border:1.5px solid #3b82f6;}
.week-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);}
.week-card.current .week-header{background:#1e3a5f;}
.sess-btn{flex:1;padding:10px 4px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;font-family:inherit;}
.sess-btn.done{background:#0d2b1f;color:#4ade80;border-color:#1a4a35;}
.sess-btn.unlocked{background:rgba(255,255,255,0.07);color:#fff;}
.timer-hero{background:linear-gradient(135deg,#1a1a2e,#0f3460);margin:-44px -16px 0;padding:calc(env(safe-area-inset-top,44px)+28px) 18px 28px;border-radius:0 0 24px 24px;text-align:center;}
.timer-hero.walk{background:linear-gradient(135deg,#0d2b1f,#1a4a35);}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;}
.pill.run{background:#1e3a5f;color:#93c5fd;border:1px solid #2d4a7a;}
.pill.walk{background:#0d2b1f;color:#86efac;border:1px solid #1a4a35;}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.badge{background:#12121f;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 8px;text-align:center;}
.badge.earned{border-color:#fbbf24;background:#1a1500;}
.badge-icon{font-size:28px;margin-bottom:5px;filter:grayscale(1) opacity(0.3);}
.badge.earned .badge-icon{filter:none;}
.badge-name{font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);}
.badge.earned .badge-name{color:#fbbf24;}
.badge-desc{font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;}
.meas-input{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;color:#fff;font-size:15px;font-weight:600;width:100%;font-family:inherit;-webkit-appearance:none;}
.meas-input:focus{outline:none;border-color:#3b82f6;}
.meas-label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:4px;}
.meas-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.weather-card{background:linear-gradient(135deg,#1e3a5f,#1a1a2e);border:1px solid rgba(59,130,246,0.25);border-radius:13px;padding:14px 16px;margin-bottom:9px;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.photo-item{border-radius:10px;overflow:hidden;position:relative;aspect-ratio:1;}
.photo-item img{width:100%;height:100%;object-fit:cover;}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:6px 8px;}
.pace-result{background:linear-gradient(135deg,#1e3a5f,#1a1a2e);border-radius:11px;padding:13px 15px;margin-top:10px;border:1px solid rgba(59,130,246,0.2);}
.pace-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.pace-row:last-child{border-bottom:none;}
.tab-bar{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.tab-btn{flex-shrink:0;padding:8px 10px;border-radius:9px;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.tab-btn.active{background:rgba(59,130,246,0.18);color:#93c5fd;border-color:rgba(59,130,246,0.3);}
.notes-input{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.07);border-radius:7px;padding:8px 10px;color:rgba(255,255,255,0.7);font-size:13px;font-family:inherit;resize:none;}
.notes-input:focus{outline:none;border-color:#3b82f6;}
.voice-btn{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.voice-btn.on{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.4);color:#93c5fd;}
.effort-btn{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 4px;cursor:pointer;font-family:inherit;text-align:center;width:100%;}
.effort-btn.selected{background:rgba(59,130,246,0.2);border-color:#3b82f6;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <svg width="150" height="150" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="50%" stop-color="#16213e"/><stop offset="100%" stop-color="#0f3460"/></linearGradient>
      <linearGradient id="cr" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
      <linearGradient id="cs" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
      <linearGradient id="cp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/><stop offset="40%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    </defs>
    <rect x="40" y="40" width="600" height="600" rx="128" fill="url(#cbg)"/>
    <circle cx="340" cy="310" r="190" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="20"/>
    <path d="M340 120 A190 190 0 1 1 174 478" fill="none" stroke="url(#cr)" stroke-width="20" stroke-linecap="round"/>
    <path d="M180 390 Q260 370 340 375 Q420 380 500 360" fill="none" stroke="url(#cp)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 5"/>
    <circle cx="340" cy="218" r="22" fill="#60a5fa"/>
    <path d="M340 240 L332 290 L320 330" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round"/>
    <path d="M340 240 L348 290 L365 325" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round"/>
    <path d="M336 260 L310 280" fill="none" stroke="#60a5fa" stroke-width="9" stroke-linecap="round"/>
    <path d="M344 258 L372 272" fill="none" stroke="#60a5fa" stroke-width="9" stroke-linecap="round"/>
    <path d="M332 290 L312 335 L305 368" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round"/>
    <path d="M348 290 L368 330 L378 362" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="302" cy="372" rx="18" ry="9" fill="url(#cs)"/>
    <ellipse cx="382" cy="366" rx="18" ry="9" fill="url(#cs)"/>
    <line x1="255" y1="255" x2="228" y2="255" stroke="rgba(59,130,246,0.5)" stroke-width="3" stroke-linecap="round"/>
    <line x1="248" y1="272" x2="218" y2="272" stroke="rgba(59,130,246,0.35)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="340" cy="116" r="7" fill="#3b82f6"/>
    <circle cx="340" cy="116" r="3" fill="#fff"/>
  </svg>
  <div style="margin-top:18px;font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;">COUCH TO 5K</div>
  <div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:4px;margin-top:4px;">YOUR RUNNING PLAN</div>
  <div style="margin-top:28px;display:flex;gap:7px;">
    <div style="width:7px;height:7px;border-radius:50%;background:#3b82f6;transition:background .3s;" id="cd0"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background .3s;" id="cd1"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background .3s;" id="cd2"></div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="hero">
    <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-bottom:2px;">Couch to 5K · N4 3FS</p>
    <h1 style="font-size:24px;font-weight:800;">Let's run 🏃</h1>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Sessions</div><div class="stat-val" id="h-done">0</div><div class="stat-sub">of 27</div></div>
      <div class="stat"><div class="stat-label">Week</div><div class="stat-val" id="h-week">1</div><div class="stat-sub">of 9</div></div>
      <div class="stat"><div class="stat-label">Streak</div><div class="stat-val" id="h-streak">0🔥</div><div class="stat-sub">days</div></div>
    </div>
  </div>
  <div style="padding-top:14px;">
    <div class="progress-bar"><div class="progress-fill" id="h-progress" style="width:0%"></div></div>
    <div id="home-next"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;">
      <div class="card" style="cursor:pointer;padding:11px 13px;" onclick="showScreen('plan')"><div style="font-size:17px;margin-bottom:3px;">📋</div><div style="font-size:13px;font-weight:700;">Full plan</div><div style="font-size:11px;color:rgba(255,255,255,0.35);">All 9 weeks</div></div>
      <div class="card" style="cursor:pointer;padding:11px 13px;" onclick="showScreen('badges')"><div style="font-size:17px;margin-bottom:3px;">🏅</div><div style="font-size:13px;font-weight:700;">Badges</div><div style="font-size:11px;color:rgba(255,255,255,0.35);" id="badge-count">0 earned</div></div>
      <div class="card" style="cursor:pointer;padding:11px 13px;" onclick="showScreen('tools')"><div style="font-size:17px;margin-bottom:3px;">⚡</div><div style="font-size:13px;font-weight:700;">Run tools</div><div style="font-size:11px;color:rgba(255,255,255,0.35);">Pace · Weather · Me</div></div>
      <div class="card" style="cursor:pointer;padding:11px 13px;" onclick="showScreen('photos')"><div style="font-size:17px;margin-bottom:3px;">📸</div><div style="font-size:13px;font-weight:700;">Photo log</div><div style="font-size:11px;color:rgba(255,255,255,0.35);" id="photo-count">0 photos</div></div>
    </div>
    <div class="card" style="border-left:3px solid #3b82f6;
